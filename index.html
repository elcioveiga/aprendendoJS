<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem Secreta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Testando JS</h1>

    <div class="bloco">
        <h2>Realizando  alteração no HTML com JS</h2>
        <p id="mensagem">Abrir mensagem</p>
        <button onclick="revelarMensagem()">Revelar mensagem</button>
        <script src="script.js"></script>
        <br><br>
    
    </div>
        
    <div class="bloco">
        <h2>Testando alterações usando variáveis</h2>
        <label for="nomeUsuario">Digite seu nome </label>
        <input type="text" id="nomeUsuario">
        <br> <br>
        <button onclick="mostraNome()">Atualizar nome</button>
        <br><br>
        
        <p id="resultaNome">Seu nome aparecerá aqui.</p>
    
    </div>

     <script src="script.js"></script>

</body>
</html>
